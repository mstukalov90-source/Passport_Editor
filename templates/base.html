<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pass Map{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #20242b;
        }
        .container {
            max-width: 420px;
            margin: 56px auto;
            background: #fff;
            border: 1px solid #e3e6ec;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        }
        h1 {
            margin: 0 0 16px;
            font-size: 24px;
        }
        form p {
            margin: 0 0 12px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #c6cbd6;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button, .button-link {
            display: inline-block;
            border: none;
            background: #1f6feb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .errorlist {
            color: #b42318;
            margin: 0 0 12px 0;
            padding-left: 18px;
        }
        .note {
            margin-top: 14px;
            font-size: 14px;
            color: #4a5565;
        }
        .container--wide {
            max-width: none;
            width: calc(100vw - 48px);
            min-height: calc(100vh - 48px);
            margin: 24px;
            box-sizing: border-box;
        }
        @media (max-width: 768px) {
            .container--wide {
                width: calc(100vw - 16px);
                margin: 8px;
                min-height: calc(100vh - 16px);
            }
        }
    </style>
</head>
<body>
<main class="container {% block container_class %}{% endblock %}">
    {% block content %}{% endblock %}
</main>
</body>
</html>
